services:
  web_corex:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SESSION_SECRET: ${SESSION_SECRET}
        AUTH_MIN_SESSION_SECRET_LENGTH: ${AUTH_MIN_SESSION_SECRET_LENGTH:-32}
    container_name: corex
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 7777
      HOSTNAME: 0.0.0.0
      TZ: UTC
      POSTHARVEST_SOLVER_PYTHON: python3
      # Ruta DENTRO del container para fotos de reclamos. El bind mount de
      # abajo expone el share SMB del host (real en /srv/postgres/...) con
      # alias /mnt/nas_planificacion para que el código no dependa del
      # layout del host.
      COMMERCIAL_CLAIMS_NAS_ROOT: /mnt/nas_planificacion/lakehouse/data/nosql/comercial/img
    ports:
      - "7777:7777"
    volumes:
      # Bind mount del NAS SMB. En el host Linux, el share está montado en
      # /srv/postgres/nas_planificacion vía autofs (CIFS, _netdev,
      # x-systemd.automount). Lo exponemos al container como
      # /mnt/nas_planificacion para que el path adentro sea agnóstico al
      # layout del host.
      #
      # IMPORTANTE: aunque el NAS esté montado en el host, Docker aísla el
      # filesystem por defecto. Sin este bind mount el container no ve la
      # ruta y los uploads/reads de fotos fallan con ENOENT.
      #
      # `propagation: rshared` es CLAVE porque el mount del host es autofs
      # (se activa/desactiva on-demand). Sin rshared el container tomaría
      # un snapshot al arranque y vería carpeta vacía si autofs aún no
      # disparó el SMB. Con rshared, cualquier (re)mount del host se
      # propaga al container en vivo.
      - type: bind
        source: /srv/postgres/nas_planificacion
        target: /mnt/nas_planificacion
        bind:
          propagation: rshared
    stop_grace_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - corex_net

networks:
  corex_net:
    name: corex_net
    driver: bridge
